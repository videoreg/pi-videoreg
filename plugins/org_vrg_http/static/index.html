<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Videoreg</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div id="app" v-cloak>
        <!-- Загрузка -->
        <div v-if="loading" style="display: flex; justify-content: center; align-items: center; min-height: 100vh;">
            <div style="text-align: center; color: var(--color-text-secondary);">
                <p>{{ $t('http.app.loading') }}...</p>
            </div>
        </div>

        <!-- Неавторизованный пользователь -->
        <login-component
            v-else-if="!isAuthenticated"
            @login-success="onLoginSuccess"
        ></login-component>

        <!-- Принудительная смена пароля -->
        <change-password-component
            v-else-if="mustChangePassword"
            :forced="true"
            @password-changed="onPasswordChanged"
            @logout="logout"
        ></change-password-component>

        <!-- Авторизованный пользователь -->
        <template v-else>
            <!-- Строка состояния -->
            <div class="status-bar">
                <!-- Бургер-кнопка (только мобильные) -->
                <button class="sidebar-burger" @click="toggleSidebar" :aria-label="$t('http.app.open_menu')">
                    <span class="sidebar-burger-line"></span>
                    <span class="sidebar-burger-line"></span>
                    <span class="sidebar-burger-line"></span>
                </button>

                <!-- Логотип (только десктоп) -->
                <h2 class="status-bar-logo">Videoreg</h2>

                <!-- Статусы -->
                <div class="status-bar-items">
                    <!-- Загрузка -->
                    <template v-if="!statusLoaded && !statusOffline">
                        <div class="spinner spinner-sm"></div>
                        <span>{{ $t('http.app.loading') }}</span>
                    </template>

                    <!-- Offline -->
                    <template v-else-if="statusOffline">
                        <div class="spinner spinner-sm"></div>
                        <span>Offline</span>
                    </template>

                    <!-- Иконки -->
                    <template v-else>
                        <!-- Камера -->
                        <tooltip ref="cameraTooltip">
                            <template #anchor="{ open }">
                                <span class="status-item" @click="open" :title="$t('http.camera.title')">
                                    <icon v-if="statusCamera === 'record'" name="camera" color="#4caf50"></icon>
                                    <icon v-else-if="statusCamera === 'pause'" name="camera" color="#ffc107"></icon>
                                    <icon v-else name="camera" color="#f44336"></icon>
                                </span>
                            </template>
                            <!-- Содержимое тултипа -->
                            <div style="margin-bottom: var(--spacing-sm);">
                                <span class="status-indicator" style="width: 100%">
                                    <span class="status-dot" :class="{ active: statusCamera === 'record' }"></span>
                                    <span>{{ statusCameraLabel }}</span>
                                </span>
                            </div>
                            <button
                                class="tooltip-btn"
                                style="flex: 1;"
                                @click="cameraStart(); $refs.cameraTooltip.close();"
                                :disabled="cameraActionLoading !== null"
                            >{{ cameraActionLoading === 'start' ? $t('http.camera.starting') : $t('http.camera.start') }}</button>
                            <button
                                class="tooltip-btn"
                                style="flex: 1;"
                                @click="cameraPause(); $refs.cameraTooltip.close();"
                                :disabled="cameraActionLoading !== null"
                            >{{ cameraActionLoading === 'pause' ? $t('http.camera.pausing') : $t('http.camera.pause') }}</button>
                            <hr class="tooltip-divider">
                            <button
                                class="tooltip-btn"
                                @click="navigate('camera'); $refs.cameraTooltip.close();"
                            >{{ $t('http.settings') }}</button>
                        </tooltip>

                        <!-- WiFi -->
                        <span class="status-item" :class="{ 'status-item--dim': !statusWifiAp && !statusWifiConnected }" @click="navigate('wifi')" title="WiFi">
                            <icon v-if="statusWifiAp" name="wifi_ap"></icon>
                            <icon v-else-if="statusWifiConnected" name="wifi"></icon>
                            <icon v-else name="wifi_off"></icon>
                        </span>

                        <!-- Модем -->
                        <span class="status-item" :class="{ 'status-item--dim': !statusModemConnected }" @click="navigate('modem')" :title="$t('http.modem.title')">
                            <icon v-if="statusModemConnected" name="modem"></icon>
                            <icon v-else name="modem_off"></icon>
                        </span>

                        <!-- WireGuard (только если активен) -->
                        <span v-if="statusWireguard" class="status-item" @click="navigate('wireguard')" title="WireGuard">
                            <icon name="vpn"></icon>
                        </span>

                        <!-- Питание (только если есть данные) -->
                        <tooltip v-if="statusPowerExists" ref="powerTooltip">
                            <template #anchor="{ open }">
                                <span class="status-item" @click="open" :title="$t('http.power.title')">
                                    <template v-if="statusPowerHasBattery">
                                        <icon v-if="statusPowerCharging" name="battery_charging"></icon>
                                        <icon v-else name="battery"></icon>
                                        {{ statusPowerPercent }}%
                                    </template>
                                    <template v-else>
                                        <icon name="power_plug"></icon>
                                    </template>
                                </span>
                            </template>
                            <!-- Содержимое тултипа -->
                            <div style="margin-bottom: var(--spacing-sm);">
                                <span class="status-indicator" style="width: 100%">
                                    <span class="status-dot" :class="{ active: statusPowerCharging }"></span>
                                    <span v-if="statusPowerHasBattery">{{ statusPowerCharging ? $t('http.power.charging') : $t('http.power.on_battery') }}</span>
                                    <span v-else>{{ statusPowerSource ? statusPowerSource.title : '—' }}</span>
                                </span>
                            </div>
                            <button
                                class="tooltip-btn"
                                @click="navigate('power'); $refs.powerTooltip.close();"
                            >{{ $t('http.settings') }}</button>
                            <hr class="tooltip-divider">
                            <button
                                class="tooltip-btn"
                                :class="{ 'tooltip-btn--success': keepAliveSuccess }"
                                @click="powerKeepAlive()"
                                :disabled="powerActionLoading !== null"
                            >{{ keepAliveSuccess ? $t('http.app.done') : (powerActionLoading === 'keep_alive' ? $t('http.power.keep_alive_wait') : $t('http.power.keep_alive_btn')) }}</button>
                            <button
                                class="tooltip-btn"
                                :class="{ 'tooltip-btn--success': rebootSuccess }"
                                @click="powerReboot()"
                                :disabled="powerActionLoading !== null"
                            >{{ rebootSuccess ? $t('http.app.done') : (powerActionLoading === 'reboot' ? $t('http.power.rebooting') : $t('http.power.reboot_btn')) }}</button>
                            <button
                                class="tooltip-btn tooltip-btn--danger"
                                :class="{ 'tooltip-btn--success': shutdownSuccess }"
                                @click="powerShutdown()"
                                :disabled="powerActionLoading !== null"
                            >{{ shutdownSuccess ? $t('http.app.done') : (powerActionLoading === 'shutdown' ? $t('http.power.shutting_down') : $t('http.power.shutdown_btn')) }}</button>
                        </tooltip>
                    </template>
                </div>
            </div>

            <div class="app-layout">
            <!-- Затемнение фона (только мобильные) -->
            <div v-if="sidebarOpen" class="sidebar-overlay" @click="closeSidebar"></div>

            <!-- Sidebar -->
            <aside class="sidebar" :class="{ 'sidebar--open': sidebarOpen }">
                <div class="sidebar-header">
                    <h2>Videoreg</h2>
                </div>

                <nav>
                    <ul class="nav-menu">
                        <li>
                            <a
                                href="#"
                                :class="{ active: currentPage === 'home' }"
                                @click.prevent="navigate('home')"
                            >
                                <icon name="dashboard"></icon><span>{{ $t('http.dashboard') }}</span>
                            </a>
                        </li>
                        <li>
                            <a
                                href="#"
                                :class="{ active: currentPage === 'trips' }"
                                @click.prevent="navigate('trips')"
                            >
                                <icon name="gps_tracks"></icon><span>{{ $t('http.trips') }}</span>
                            </a>
                        </li>
                        <li>
                            <a
                                href="#"
                                :class="{ active: currentPage === 'live-broadcast' }"
                                @click.prevent="navigate('live-broadcast')"
                            >
                                <icon name="live_tv"></icon><span>{{ $t('http.live.menu') }}</span>
                            </a>
                        </li>
                        <li>
                            <a
                                href="#"
                                :class="{ active: currentPage === 'media-feed' }"
                                @click.prevent="navigate('media-feed')"
                            >
                                <icon name="media"></icon><span>{{ $t('http.media') }}</span>
                            </a>
                        </li>
                        <li>
                            <a
                                href="#"
                                :class="{ active: currentPage === 'media-fave' }"
                                @click.prevent="navigate('media-fave')"
                            >
                                <icon name="star"></icon><span>{{ $t('http.favorites') }}</span>
                            </a>
                        </li>
                        <li>
                            <a
                                href="#"
                                :class="{ active: currentPage === 'sms-inbox' }"
                                @click.prevent="navigate('sms-inbox')"
                            >
                                <icon name="sms"></icon><span>{{ $t('http.sms_inbox.title') }}</span>
                            </a>
                        </li>
                        <li>
                            <a
                                href="#"
                                :class="{ active: currentPage === 'gps-tracks' }"
                                @click.prevent="navigate('gps-tracks')"
                            >
                                <icon name="map"></icon><span>{{ $t('http.gps_tracks.title') }}</span>
                            </a>
                        </li>
                        <li>
                            <a
                                href="#"
                                :class="{ active: currentPage === 'stat' }"
                                @click.prevent="navigate('stat')"
                            >
                                <icon name="chart"></icon><span>{{ $t('http.statistics') }}</span>
                            </a>
                        </li>
                        <li>
                            <a
                                href="#"
                                :class="{ active: isSettingsActive }"
                                @click.prevent="navigate('settings')"
                            >
                                <icon name="settings"></icon><span>{{ $t('http.settings') }}</span>
                            </a>
                        </li>
                        <li class="nav-menu-divider"></li>
                        <li v-if="user" class="nav-menu-username">{{ user.username }}</li>
                        <li>
                            <a
                                href="#"
                                :class="{ active: currentPage === 'change-password' }"
                                @click.prevent="navigate('change-password')"
                            >
                                {{ $t('http.change_password') }}
                            </a>
                        </li>
                        <li>
                            <a href="#" class="nav-menu-item--danger" @click.prevent="logout">
                                {{ $t('http.logout') }}
                            </a>
                        </li>
                    </ul>
                </nav>
            </aside>

            <!-- Основной контент -->
            <main class="main-content">
                <component :is="currentComponent" @navigate="navigate" :bg-image-url="statusBgImageUrl"></component>
            </main>
            </div><!-- /.app-layout -->
        </template><!-- /v-else авторизованный -->
    </div>

    <script src="/static/vue.global.js"></script>
    <!-- Компоненты -->
    <script src="/static/js/components/Icon.js"></script>
    <script src="/static/js/components/Tooltip.js"></script>
    <script src="/static/js/components/ToggleSwitch.js"></script>
    <script src="/static/js/components/TabSwitch.js"></script>
    <script src="/static/js/components/ProgressBar.js"></script>
    <script src="/static/js/components/LineChart.js"></script>
    <script src="/static/js/components/MultiLineChart.js"></script>
    <script src="/static/js/components/TripsMediaItem.js"></script>
    <script src="/static/js/components/pages/LoginComponent.js"></script>
    <script src="/static/js/components/pages/HomeComponent.js"></script>
    <script src="/static/js/components/pages/WireguardSettingsComponent.js"></script>
    <script src="/static/js/components/pages/ModemSettingsComponent.js"></script>
    <script src="/static/js/components/pages/TelegramBotSettingsComponent.js"></script>
    <script src="/static/js/components/pages/WiFiSettingsComponent.js"></script>
    <script src="/static/js/components/pages/ChangePasswordComponent.js"></script>
    <script src="/static/js/components/pages/CameraSettingsComponent.js"></script>
    <script src="/static/js/components/pages/PowerSettingsComponent.js"></script>
    <script src="/static/js/components/pages/MediaFeedComponent.js"></script>
    <script src="/static/js/components/pages/MediaFaveComponent.js"></script>
    <script src="/static/js/components/pages/StorageSettingsComponent.js"></script>
    <script src="/static/js/components/pages/SystemSettingsComponent.js"></script>
    <script src="/static/js/components/pages/StatComponent.js"></script>
    <script src="/static/js/components/pages/SmsSettingsComponent.js"></script>
    <script src="/static/js/components/pages/SmsInboxComponent.js"></script>
    <script src="/static/js/components/pages/GpsTracksComponent.js"></script>
    <script src="/static/js/components/pages/TripsComponent.js"></script>
    <script src="/static/js/components/pages/UsersSettingsComponent.js"></script>
    <script src="/static/js/components/pages/SettingsComponent.js"></script>
    <script src="/static/js/components/pages/LiveBroadcastComponent.js"></script>
    <!-- i18n движок (до app.js) -->
    <script src="/static/js/i18n.js"></script>
    <!-- Главное приложение -->
    <script src="/static/js/app.js"></script>
</body>
</html>
