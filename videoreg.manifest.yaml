locale: en

path:
  jpeg: /mnt/data/videoreg/jpeg
  h264: /mnt/data/videoreg/h264
  mp4: /mnt/data/videoreg/mp4
  jpeg_fave: /mnt/data/videoreg/jpeg_fave
  h264_fave: /mnt/data/videoreg/h264_fave

services:
  - name: vrg-core
    plugins:
      - org_vrg_core
      - org_vrg_bus
      - org_vrg_net
      - org_vrg_power
      - org_vrg_stat
  - name: vrg-camera
    plugins:
      - org_vrg_camera
  - name: vrg-modem
    plugins:
      - org_vrg_gps
      - org_vrg_sms
  - name: vrg-http
    plugins:
      - org_vrg_http
  - name: vrg-bot
    plugins:
      - org_vrg_bot
  - name: vrg-pisugar-watchdog
    plugins: []
  - name: vrg-mediamtx
    plugins: []

plugins:
  - id: org_vrg_core
    name: core
    enabled: true

  - id: org_vrg_bus
    name: bus
    enabled: true

  - id: org_vrg_net
    name: net
    enabled: true
    commands:
      - name: net
        title: Network commands
      - name: wifi_block
        title: Disable WiFi module
        hidden: true
      - name: wifi_unblock
        title: Enable WiFi module
        hidden: true

  - id: org_vrg_power
    name: power
    enabled: true
    commands:
      - name: keep
        title: Keep alive for N min.
        args: 5
      - name: power
        title: Power commands
      - name: reboot
        title: Reboot
      - name: shutdown
        title: Shutdown

  - id: org_vrg_stat
    name: stat
    enabled: true
    commands:
      - name: stat
        title: Get stat commands
        hidden: true
      - name: temp
        title: Get CPU temperature

  - id: org_vrg_camera
    name: camera
    enabled: true
    commands:
      - name: photo
        title: Take photo
      - name: video
        title: Take short video
      - name: camera
        title: Camera commands
      - name: video_pause
        title: Pause video recording
        hidden: true
      - name: video_start
        title: Start video recording
        hidden: true
      - name: stream
        title: Start RTSP stream
        hidden: true
    pages:
      - url: feed
        menu: Лента
        component: MediaFeedComponent.js

      - url: camera
        menu: Камера
        component: CameraComponent.js

  - id: org_vrg_bot
    name: bot
    enabled: true

  - id: org_vrg_http
    name: http
    enabled: true

  - id: org_vrg_gps
    name: gps
    enabled: true
    commands:
      - name: gps
        title: GPS commands

  - id: org_vrg_sms
    name: sms
    enabled: true
    commands:
      - name: sms
        title: SMS commands

interfaces:
  - name: bot
    interactions:
      text: bot.send_text
      edit_text: bot.edit_message
      status: bot.send_status
      image: bot.send_image
      video: bot.send_video
      document: bot.send_document

  - name: sms
    interactions:
      text: sms.send_text
