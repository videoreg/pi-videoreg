locale: en

path:
  jpeg: /mnt/data/videoreg/jpeg
  h264: /mnt/data/videoreg/h264
  mp4: /mnt/data/videoreg/mp4
  jpeg_fave: /mnt/data/videoreg/jpeg_fave
  h264_fave: /mnt/data/videoreg/h264_fave

services:
  - vrg-core
  - vrg-camera
  - vrg-modem
  - vrg-http
  - vrg-bot
  - vrg-pisugar-watchdog
  - vrg-mediamtx

plugins:
  - id: org_vrg_core
    name: core
    service: vrg-core
    enabled: true

  - id: org_vrg_bus
    name: bus
    service: vrg-core
    enabled: true

  - id: org_vrg_net
    name: net
    service: vrg-core
    enabled: true
    commands:
      - name: net
        title: Network commands
      - name: wifi_block
        title: Disable WiFi module
        hidden: true
      - name: wifi_unblock
        title: Enable WiFi module
        hidden: true

  - id: org_vrg_power
    name: power
    service: vrg-core
    enabled: true
    commands:
      - name: keep
        title: Keep alive for N min.
        args: 5
      - name: power
        title: Power commands
      - name: reboot
        title: Reboot
      - name: shutdown
        title: Shutdown

  - id: org_vrg_stat
    name: stat
    service: vrg-core
    enabled: true
    commands:
      - name: stat
        title: Get stat commands
        hidden: true
      - name: temp
        title: Get CPU temperature

  - id: org_vrg_camera
    name: camera
    service: vrg-camera
    enabled: true
    commands:
      - name: photo
        title: Take photo
      - name: video
        title: Take short video
      - name: camera
        title: Camera commands
      - name: video_pause
        title: Pause video recording
        hidden: true
      - name: video_start
        title: Start video recording
        hidden: true
    pages:
      - url: feed
        menu: Лента
        component: MediaFeedComponent.js

      - url: camera
        menu: Камера
        component: CameraComponent.js

  - id: org_vrg_bot
    name: bot
    service: vrg-bot
    enabled: true

  - id: org_vrg_http
    name: http
    service: vrg-http
    enabled: true

  - id: org_vrg_gps
    name: gps
    service: vrg-modem
    enabled: true
    commands:
      - name: gps
        title: GPS commands

  - id: org_vrg_sms
    name: sms
    service: vrg-modem
    enabled: true
    commands:
      - name: sms
        title: SMS commands

interfaces:
  - name: bot
    interactions:
      text: bot.send_text
      status: bot.send_status
      image: bot.send_image
      video: bot.send_video
      document: bot.send_document
  
  - name: sms
    interactions:
      text: sms.send_text

